# Kora Apparel - Unified Render Deployment Blueprint
# This file defines the frontend, backend, and redis services for a 1-click deploy.

services:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Backend Service (Express API)
  # ────────────────────────────────────────────────────────────────────────────
  - type: web
    name: kora-apparel-backend
    region: singapore
    plan: free
    runtime: docker
    dockerfilePath: Dockerfile.backend
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: kora-apparel-redis
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: kora-apparel-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Frontend Service (Next.js)
  # ────────────────────────────────────────────────────────────────────────────
  - type: web
    name: kora-apparel-frontend
    region: singapore
    plan: free
    runtime: docker
    dockerfilePath: Dockerfile.frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: kora-apparel-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: kora-apparel-backend
          envVarKey: RENDER_EXTERNAL_URL

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Redis Cache Service
  # ────────────────────────────────────────────────────────────────────────────
  - type: redis
    name: kora-apparel-redis
    region: singapore
    plan: free
    # IP allowlist is removed to keep Redis private and secure. 
    # Only services in this blueprint can access it internally.
