# Render Infrastructure as Code (Blueprint)
# Deploy the Kora Apparel platform with one click

services:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Backend API Service
  # ────────────────────────────────────────────────────────────────────────────
  - type: web
    name: kora-apparel-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    region: singapore # Change to closest to your DB/users
    plan: free # Can be upgraded to starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      # ⚠️ Secrets: Render will ask you to fill these out securely in the dashboard
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: kora-apparel-redis
          property: connectionString
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # Cross-references the frontend URL generated by Render below
      - key: FRONTEND_URL
        fromService:
          type: web
          name: kora-apparel-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Frontend Next.js Service
  # ────────────────────────────────────────────────────────────────────────────
  - type: web
    name: kora-apparel-frontend
    env: docker
    dockerfilePath: ./Dockerfile.frontend
    region: singapore
    plan: free # Can be upgraded to starter
    branch: main
    envVars:
      - key: PORT
        value: 3000
      # The UI needs to know the Backend URL at *Build Time* for Next.js standalone
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: kora-apparel-backend
          property: host
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: kora-apparel-backend
          property: host

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Redis Cache Service (Optional unless strictly relying on Redis)
  # ────────────────────────────────────────────────────────────────────────────
  - type: redis
    name: kora-apparel-redis
    region: singapore
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow Connections from anywhere
